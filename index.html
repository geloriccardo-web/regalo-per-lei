<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Un regalo per te</title>

<style>
body{
  margin:0;
  background: radial-gradient(circle, #160000, #000);
  font-family: Georgia, serif;
  color:white;
  text-align:center;
}

.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
}

h1{
  font-size:32px;
  text-shadow:0 0 15px #ff0055;
}

p{
  max-width:330px;
  line-height:1.7;
  font-size:17px;
}

#gift{
  font-size:80px;
  cursor:pointer;
  margin-top:25px;
  animation:pulse 1.5s infinite;
  filter:drop-shadow(0 0 25px #ff007f);
}

#message{
  display:none;
  margin-top:25px;
  animation:fade 2s ease;
}

.final{
  color:#ffb6d9;
  text-shadow:0 0 15px #ff007f;
  font-style:italic;
}

.heart{
  position:fixed;
  top:-20px;
  color:#ff007f;
  animation:fall 5s linear infinite;
  font-size:20px;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.18);}
  100%{transform:scale(1);}
}

@keyframes fade{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes fall{
  to{
    transform:translateY(110vh);
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="container">

<h1>Ho qualcosa per te...</h1>

<p>
Ci sono cose che non si comprano... si creano.<br><br>
Ho messo tempo, pensieri e un pezzo di cuore dentro qualcosa che parla di te.<br><br>
Se sei pronta... tocca il regalo.
</p>

<div id="gift" onclick="openGift()">🎁</div>

<div id="message">
<p class="final">
Questo non è solo un regalo.<br><br>
È un piccolo pezzo di me,<br>
creato nel silenzio,<br>
per dirti che sei importante.
</p>
</div>

</div>

<script>
function openGift(){
  document.getElementById("gift").style.display = "none";
  document.getElementById("message").style.display = "block";
  createHearts();
}

function createHearts(){
  for(let i = 0; i < 25; i++){
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDelay = Math.random() * 3 + "s";
    document.body.appendChild(heart);
  }
}
</script>

</body>
</html>
