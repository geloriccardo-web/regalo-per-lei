<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Un regalo per te</title>

<style>
body{
  margin:0;
  background:radial-gradient(circle,#25000d,#000);
  color:white;
  font-family:Georgia,serif;
  text-align:center;
  overflow:hidden;
}

.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
}

h1{
  text-shadow:0 0 25px #ff0066;
  animation:fade 2s ease;
}

p{
  max-width:330px;
  line-height:1.7;
}

#gift{
  font-size:90px;
  cursor:pointer;
  margin-top:25px;
  animation:pulse 1.4s infinite;
  filter:drop-shadow(0 0 35px #ff007f);
}

#message{
  display:none;
  margin-top:25px;
  animation:cinema 2.5s ease;
}

#message img{
  width:85%;
  max-width:370px;
  border-radius:20px;
  box-shadow:0 0 45px #ff007f;
  margin-bottom:22px;
  animation:zoomIn 3s ease;
}

.final{
  color:#ffc1df;
  font-style:italic;
  text-shadow:0 0 20px #ff007f;
}

.heart{
  position:fixed;
  top:-20px;
  color:#ff007f;
  animation:fall 5s linear infinite;
}

.flash{
  animation:flash 0.8s ease;
}

@keyframes pulse{
  50%{transform:scale(1.2);}
}

@keyframes fade{
  from{opacity:0;}
  to{opacity:1;}
}

@keyframes cinema{
  from{opacity:0; transform:scale(.7) translateY(40px);}
  to{opacity:1; transform:scale(1) translateY(0);}
}

@keyframes zoomIn{
  from{opacity:0; transform:scale(.75); filter:blur(6px);}
  to{opacity:1; transform:scale(1); filter:blur(0);}
}

@keyframes fall{
  to{transform:translateY(110vh); opacity:0;}
}

@keyframes flash{
  0%{background:white;}
  100%{background:radial-gradient(circle,#25000d,#000);}
}
</style>
</head>

<body>

<div class="container">

<h1>Ho qualcosa per te...</h1>

<p>
Ci sono cose che non si comprano... si creano.<br><br>
Ho messo tempo, pensieri e un pezzo di cuore dentro qualcosa che parla di te.<br><br>
Se sei pronta... tocca il regalo.
</p>

<div id="gift" onclick="openGift()">🎁</div>

<div id="message">

<img src="IMG_20260426_232240.jpg" alt="Disegno">

<p class="final">
Questo non è solo un regalo.<br><br>
È un piccolo pezzo di me,<br>
creato nel silenzio,<br>
per dirti che sei importante.
</p>

</div>

</div>

<script>
function openGift(){
  document.body.classList.add("flash");
  document.getElementById("gift").style.display="none";
  document.getElementById("message").style.display="block";
  createHearts();

  if(navigator.vibrate){
    navigator.vibrate([150,80,150]);
  }
}

function createHearts(){
  for(let i=0;i<60;i++){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(12+Math.random()*22)+"px";
    heart.style.animationDelay=Math.random()*3+"s";
    heart.style.opacity=Math.random();
    document.body.appendChild(heart);
  }
}
</script>

</body>
</html>
