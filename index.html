<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Un regalo per te</title>

<style>
body{
  margin:0;
  background: radial-gradient(circle, #0a0000, #000000);
  font-family: 'Georgia', serif;
  color: white;
  text-align: center;
}

.container{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  padding:20px;
}
}

h1{
  font-size:32px;
  margin-bottom:20px;
  animation:fade 2s ease;
}

p{
  font-size:18px;
  max-width:300px;
  margin:auto;
  line-height:1.6;
  animation:fade 3s ease;
}

button{
  margin-top:20px;
  padding:12px 20px;
  background:#90004d;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
  transition:0.3s;
}

button:hover{
  background:#ff007f;
  transform:scale(1.1);
}

#gift{
  display:none;
  margin-top:40px;
  animation:fade 2s ease;
}

img{
  max-width:80%;
  border-radius:15px;
  box-shadow:0 0 25px #ff007f;
  animation:glow 2s infinite alternate;
}

.final-text{
  margin-top:25px;
  font-size:18px;
  font-style:italic;
}

@keyframes fade{
  from{opacity:0;}
  to{opacity:1;}
}

@keyframes glow{
  from{box-shadow:0 0 10px #ff007f;}
  to{box-shadow:0 0 30px #ff007f;}
}
</style>

</head>

<body>

<div class="container">

<h1>Ho qualcosa per te...</h1>

<p>
Ci sono cose che non si comprano... si creano.<br><br>
Ho messo tempo, pensieri  
e un pezzo di cuore  
dentro qualcosa che parla di te.<br><br>
Se sei pronta... scoprilo.
</p>

<button onclick="showGift()">
Scopri cosa ho per te
</button>

<div id="gift">

<img src="https://via.placeholder.com/600x400.png?text=Il+tuo+disegno" alt="Disegno">

<p class="final-text">
Questo non è solo un disegno.<br>
È il modo più silenzioso  
che ho trovato  
per dirti che sei importante per me.
</p>

</div>

</div>

<script>
function showGift(){
  document.getElementById("gift").style.display = "block";
  document.querySelector("button").style.display = "none";
}
</script>

</body>
</html>
