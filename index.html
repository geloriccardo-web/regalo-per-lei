<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Un regalo per te</title>

<style>
body{
  margin:0;
  background: radial-gradient(circle, #0a0000, #000000);
  font-family: 'Georgia', serif;
  color:white;
  text-align:center;
}

/* CENTRA TUTTO */
.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
}

h1{
  font-size:32px;
  margin-bottom:20px;
}

p{
  font-size:18px;
  max-width:320px;
  line-height:1.6;
}

/* REGALO */
#gift{
  font-size:70px;
  cursor:pointer;
  margin-top:20px;
  animation: glow 2s infinite alternate;
}

/* MESSAGGIO NASCOSTO */
#message{
  display:none;
  margin-top:30px;
  animation: fade 2s ease;
}

/* ANIMAZIONI */
@keyframes fade{
  from{opacity:0;}
  to{opacity:1;}
}

@keyframes glow{
  from{ text-shadow: 0 0 10px #ff007f; }
  to{ text-shadow: 0 0 30px #ff007f; }
}
</style>

</head>

<body>

<div class="container">

<h1>Ho qualcosa per te...</h1>

<p>
Ci sono cose che non si comprano... si creano.<br><br>
Ho messo tempo, pensieri e un pezzo di cuore dentro qualcosa che parla di te.<br><br>
Se sei pronta... scoprilo.
</p>

<div id="gift" onclick="openGift()">🎁</div>

<div id="message">
<p>
Questo non è solo un regalo.<br>
È un piccolo pezzo di me,<br>
creato per dirti che sei importante.
</p>
</div>

</div>

<script>
function openGift(){
  document.getElementById("gift").style.display = "none";
  document.getElementById("message").style.display = "block";
}
</script>

</body>
</html>
