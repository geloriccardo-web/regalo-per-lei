<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Un regalo per te</title>

<style>
body{
  margin:0;
  background:radial-gradient(circle,#25000d,#000);
  color:white;
  font-family:Georgia,serif;
  text-align:center;
  overflow-x:hidden;
}

.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
}

h1{
  text-shadow:0 0 25px #ff0066;
  transition:.5s;
}

p{
  max-width:330px;
  line-height:1.7;
}

#intro{
  min-height:120px;
}

#gift{
  font-size:90px;
  cursor:pointer;
  margin-top:25px;
  animation:pulse 1.4s infinite;
  filter:drop-shadow(0 0 35px #ff007f);
}

#message{
  display:none;
  margin-top:25px;
  animation:cinema 2.5s ease;
}

#message img{
  width:85%;
  max-width:370px;
  border-radius:20px;
  margin-bottom:22px;
  display:block;
  animation:zoomIn 3s ease, breathing 6s infinite ease-in-out;
  box-shadow:
    0 0 25px #ff007f,
    0 0 60px #ff007f,
    0 0 120px rgba(255,0,120,0.6);
}

.final{
  color:#ffc1df;
  font-style:italic;
  text-shadow:
    0 0 10px #ff007f,
    0 0 25px #ff007f,
    0 0 50px rgba(255,0,120,0.6);
}

.heart{
  position:fixed;
  top:-20px;
  color:#ff007f;
  animation:fall 5s linear infinite;
}

.flash{
  animation:flash .8s ease;
}

@keyframes pulse{
  50%{transform:scale(1.2);}
}

@keyframes cinema{
  from{opacity:0; transform:scale(.7) translateY(40px);}
  to{opacity:1; transform:scale(1) translateY(0);}
}

@keyframes zoomIn{
  from{opacity:0; transform:scale(.75); filter:blur(6px);}
  to{opacity:1; transform:scale(1); filter:blur(0);}
}

@keyframes breathing{
  0%{transform:scale(1);}
  50%{transform:scale(1.03);}
  100%{transform:scale(1);}
}

@keyframes fall{
  to{transform:translateY(110vh); opacity:0;}
}

@keyframes flash{
  0%{background:white;}
  100%{background:radial-gradient(circle,#25000d,#000);}
}
</style>
</head>

<body>

<div class="container">

<h1>Ho qualcosa per te...</h1>

<p id="intro"></p>

<div id="gift" onclick="openGift()">🎁</div>

<div id="message">
<img src="IMG_20260426_232240.jpg" alt="Disegno">

<p class="final" id="finalText"></p>
</div>

</div>

<script>
const introText =
"Ci sono cose che non si comprano... si creano.\n\n" +
"Ho messo tempo, pensieri e un pezzo di cuore dentro qualcosa che parla di te.\n\n" +
"Se sei pronta... tocca il regalo.\n(fidati di me)";

const finalText =
"Questo non è solo un regalo.\n\n" +
"È un piccolo pezzo di me,\n" +
"creato nel silenzio,\n" +
"per dirti che sei importante.";

window.onload = function(){
  typeIntro();
};

function typeIntro(){
  let i = 0;
  const box = document.getElementById("intro");
  box.innerHTML = "";

  const timer = setInterval(() => {
    if(i < introText.length){
      box.innerHTML += introText[i] === "\n" ? "<br>" : introText[i];
      i++;
    } else {
      clearInterval(timer);
    }
  }, 35);
}

function openGift(){
  document.body.classList.add("flash");
  document.querySelector("h1").style.transform = "scale(1.1)";
  document.getElementById("gift").style.display="none";
  document.getElementById("message").style.display="block";
  createHearts();
  typeFinal();

  if(navigator.vibrate){
    navigator.vibrate([150,80,150,80,200]);
  }
}

function typeFinal(){
  let i = 0;
  const box = document.getElementById("finalText");
  box.innerHTML = "";

  const timer = setInterval(() => {
    if(i < finalText.length){
      box.innerHTML += finalText[i] === "\n" ? "<br>" : finalText[i];
      i++;
    } else {
      clearInterval(timer);
    }
  }, 45);
}

function createHearts(){
  for(let i=0;i<80;i++){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(12+Math.random()*24)+"px";
    heart.style.animationDelay=Math.random()*3+"s";
    heart.style.opacity=Math.random();
    document.body.appendChild(heart);
  }
}
</script>

</body>
</html>
