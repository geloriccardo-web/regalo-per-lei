<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Un regalo per te</title>

<style>
body{
    margin:0;
    background: radial-gradient(circle, #0a0000, #000000);
    font-family: 'Georgia', serif;
    color: white;
    text-align: center;
    overflow:hidden;
}

.container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

#gift{
    font-size:60px;
    cursor:pointer;
    transition:0.3s;
}

#gift:hover{
    transform:scale(1.2);
}

#message{
    display:none;
    margin-top:20px;
    animation:fade 2s ease;
}

h1{
    font-size:28px;
}

p{
    font-size:18px;
    max-width:300px;
    margin:auto;
    line-height:1.5;
}

@keyframes fade{
    from{opacity:0;}
    to{opacity    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background-color: #99004d;
}

#gift {
    display: none;
    margin-top: 40px;
}

img {
    max-width: 80%;
    border-radius: 15px;
    box-shadow: 0 0 25px #99004d;
}

.final-text {
    margin-top: 25px;
    font-size: 18px;
    font-style: italic;
}
</style>

</head>

<body>

<div class="container">

<h1>Ho qualcosa per te...</h1>

<p>
Ci sono cose che non si comprano…  
si creano.<br><br>

Ho messo tempo, pensieri  
e un pezzo di cuore  
dentro qualcosa che parla di te.<br><br>

Se sei pronta…  
scoprilo.
</p>

<button onclick="showGift()">
Scopri cosa ho per te
</button>

<div id="gift">

<img src="https://via.placeholder.com/600x400.png?text=Qui+apparirà+il+disegno" alt="Disegno">

<p class="final-text">
Questo non è solo un disegno.  
È il modo più silenzioso  
che ho trovato  
per dirti che sei importante per me.
</p>

</div>

</div>

<script>

function showGift() {
    document.getElementById("gift").style.display = "block";
}

</script>

</body>
</html>
